<body>
<div id="app"></div>

<script>
// ── GAME CONSTANTS ────────────────────────────────────────────────────────────
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const START_MONTH = 5;
const START_YEAR = 2026;
const APPROVAL_SCALE = 0.55;

// ── INITIAL STATE ─────────────────────────────────────────────────────────────
// CONTEXT: The US invaded Iran in March 2026. It is now June 2026 — 3 months in.
// The war is ongoing. Oil prices spiked. Approval at 38.1%. Three active conflicts.
function createState() {
  return {
    turn: 0, gameOver: false, victory: false, endReason: '',
    // Iran war starting conditions: R hawks support it, D/I are skeptical
    // 0.32*78 + 0.35*8 + 0.33*32 = 24.96 + 2.80 + 10.56 = 38.32 ≈ 38.1%
    approval_r: 78, approval_d: 8, approval_i: 32, approval: 38.1,
    gdp_growth: 1.8,        // War uncertainty slowing growth
    unemployment: 4.2,
    inflation: 3.8,          // As specified — oil shock building
    interest_rate: 5.50,    // Fed tightening due to war inflation risk
    market_confidence: 49,   // Markets rattled by Iran invasion
    military_readiness: 68,  // Forces deployed — somewhat depleted
    threat_level: 3,         // HIGH — active Middle East war
    legal_exposure: 25, civil_unrest: 38, congress_support: 50,
    media_favorability: 18,  // Press coverage of war casualties is brutal
    house_seats: 222, senate_seats: 53,
    budget_health: 58,       // War spending already draining budget
    consecutive_low_market: 0,
    // THREE ACTIVE CONFLICTS at game start
    active_conflicts: ['Ukraine-Russia War', 'Gaza Conflict', 'Iran-US War'],
    completed_actions: new Set(),
    action_cooldowns: {},
    // Starting news briefing reflects Iran war situation
    news_log: [
      'Day 63 of Iran War — IRGC resistance stiffening in southern provinces',
      'Oil at $162/barrel — gas prices hit record $6.20 nationwide',
      'UN Security Council 11-4 condemns invasion; US vetoes resolution',
      'NATO: most allies refuse to participate; UK gives \'limited intelligence support\'',
      'Iran proxies attack US bases in Iraq and Syria — 847 US casualties total',
      'Congress 52-48 funds war continuation; 14 Republicans voted against',
    ],
    major_achievements: [], major_disasters: [],
    action_history: [],
    seen_events: new Set(),
    midterm_done: false,
    pending_events: [],
    flags: {
      ukraine_war_active: true, israel_conflict_active: true,
      iran_nuclear_program: false,  // DESTROYED in initial strikes
      china_taiwan_tension: true,
      nk_missile_tests: true, border_crisis: true,
      massive_tariffs: false, nato_stressed: true,
      iran_war: true,       // ALREADY AT WAR WITH IRAN
      iran_deal_happened: false,  // No deal — went straight to war
      china_war: false, world_war_3: false,
      economic_collapse: false, shutdown_active: false,
      ukraine_peace: false, nk_summit_happened: false,
      phe_declared: false,
      purged_doj: false, russia_warming: false,
      pandemic_active: false, pandemic_warning: false,
      trade_war_china: true, recession_risk: true,  // War risk is real
      summit_done: false, ceasefire_tried: false,
    },
    // Relations adjusted for Iran war: allies upset, Israel/Saudi pleased
    relations: {
      Russia: -45,    // More hostile — watching US military overextension
      China: -32,     // Opposed to US unilateral action
      Ukraine: 52,    // Unchanged
      EU: 8,          // Critical of invasion, relations strained
      UK: 52,         // Reluctant limited support only
      NATO: 18,       // Deeply divided — most members opposed invasion
      Israel: 85,     // Delighted — Iran nuclear program destroyed
      'Saudi Arabia': 65,  // Quietly supportive — Iran weakened
      Iran: -100,     // AT WAR — zero diplomatic relations
      'North Korea': -88, Mexico: 15, Canada: 22,
      Taiwan: 62,     // Worried US military is distracted
      Japan: 60,      // Supportive but worried about NK opportunism
      'South Korea': 58, UN: -15,  // UN formally condemned invasion
      Turkey: 8,      // Complicated — opposed war, sees opportunity
      India: 40       // Neutral, abstained at UN
    },
    conflict_balances: {
      'Ukraine-Russia War': -12,
      'Gaza Conflict': 20,
      'Iran-US War': 22    // US achieved early objectives but resistance building
    }
  };
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function rnd(lo, hi) { return lo + Math.random() * (hi - lo); }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

function getDate(s) {
  const idx = (START_MONTH + s.turn) % 12;
  const year = START_YEAR + Math.floor((START_MONTH + s.turn) / 12);
  return { month: MONTHS[idx], year };
}

function syncApproval(s) {
  s.approval = clamp(0.32 * s.approval_r + 0.35 * s.approval_d + 0.33 * s.approval_i, 0, 100);
}

function applyEffect(s, key, val) {
  if (key.startsWith('rel:')) {
    const c = key.slice(4);
    if (s.relations[c] !== undefined) s.relations[c] = clamp(s.relations[c] + val, -100, 100);
  } else if (key.startsWith('flag:')) {
    s.flags[key.slice(5)] = val;
  } else if (key === 'approval_r') {
    s.approval_r = clamp(s.approval_r + val * APPROVAL_SCALE, 20, 99);
    syncApproval(s);
  } else if (key === 'approval_d') {
    s.approval_d = clamp(s.approval_d + val * APPROVAL_SCALE, 5, 55);
    syncApproval(s);
  } else if (key === 'approval_i') {
    s.approval_i = clamp(s.approval_i + val * APPROVAL_SCALE, 5, 95);
    syncApproval(s);
  } else if (key === 'approval') {
    const sc = val * APPROVAL_SCALE;
    s.approval_r = clamp(s.approval_r + sc * 0.55, 20, 99);
    s.approval_d = clamp(s.approval_d + sc * 0.45, 5, 55);
    s.approval_i = clamp(s.approval_i + sc * 0.60, 5, 95);
    syncApproval(s);
  } else if (key === 'threat_level') {
    s.threat_level = clamp(s.threat_level + val, 1, 5);
  } else if (key === 'add_conflict') {
    if (!s.active_conflicts.includes(val)) s.active_conflicts.push(val);
  } else if (key === 'remove_conflict') {
    s.active_conflicts = s.active_conflicts.filter(c => c !== val);
  } else if (key === 'achievement') {
    if (val && !s.major_achievements.includes(val)) s.major_achievements.push(val);
  } else if (key === 'disaster') {
    if (val && !s.major_disasters.includes(val)) s.major_disasters.push(val);
  } else if (key === 'balance:Ukraine-Russia War') {
    if (s.conflict_balances['Ukraine-Russia War'] !== undefined)
      s.conflict_balances['Ukraine-Russia War'] = clamp(s.conflict_balances['Ukraine-Russia War'] + val, -90, 90);
  } else if (key === 'balance:Gaza Conflict') {
    if (s.conflict_balances['Gaza Conflict'] !== undefined)
      s.conflict_balances['Gaza Conflict'] = clamp(s.conflict_balances['Gaza Conflict'] + val, -90, 90);
  } else if (key === 'gdp_growth') {
    s.gdp_growth = clamp(s.gdp_growth + val, -15, 12);
  } else if (key === 'unemployment') {
    s.unemployment = clamp(s.unemployment + val, 2, 30);
  } else if (key === 'inflation') {
    s.inflation = clamp(s.inflation + val, -2, 40);
  } else if (key === 'market_confidence') {
    s.market_confidence = clamp(s.market_confidence + val, 0, 100);
  } else if (key === 'military_readiness') {
    s.military_readiness = clamp(s.military_readiness + val, 0, 100);
  } else if (key === 'budget_health') {
    s.budget_health = clamp(s.budget_health + val, 0, 100);
  } else if (key === 'legal_exposure') {
    s.legal_exposure = clamp(s.legal_exposure + val, 0, 100);
  } else if (key === 'civil_unrest') {
    s.civil_unrest = clamp(s.civil_unrest + val, 0, 100);
  } else if (key === 'congress_support') {
    s.congress_support = clamp(s.congress_support + val, 10, 95);
  } else if (key === 'house_seats') {
    s.house_seats = clamp(s.house_seats + val, 100, 340);
  } else if (key === 'senate_seats') {
    s.senate_seats = clamp(s.senate_seats + val, 30, 100);
  }
}

function applyEffects(s, effects) {
  for (const [k, v] of Object.entries(effects)) applyEffect(s, k, v);
}

function addNews(s, item) {
  s.news_log.unshift(item);
  s.news_log = s.news_log.slice(0, 6);
}

function calcScore(s) {
  let score = Math.floor(s.approval * 4);
  score += Math.floor(s.market_confidence * 1.5);
  score += Math.floor(s.military_readiness * 0.8);
  score -= Math.floor(s.legal_exposure * 1.5);
  score -= Math.floor(s.civil_unrest * 0.8);
  const avgRel = Object.values(s.relations).reduce((a,b)=>a+b,0) / Object.keys(s.relations).length;
  score += Math.floor(avgRel * 0.8);
  score += s.major_achievements.length * 50;
  score -= s.major_disasters.length * 45;
  if (s.victory && s.turn >= 16 && s.approval > 35) score += (s.turn - 15) * 2;
  if (s.victory && s.inflation < 4.5) score += 40;
  if (s.approval_r > 75) score += 20;
  if (s.approval_d > 20) score += Math.floor((s.approval_d - 20) * 0.8);
  if (avgRel > 5) score += 30;
  return clamp(score, 0, 1000);
}

function legacyTitle(score, victory) {
  if (!victory) return 'Cautionary Tale';
  if (score >= 850) return 'Greatest President in History';
  if (score >= 700) return 'Transformational Leader';
  if (score >= 550) return 'Solid Commander-in-Chief';
  if (score >= 400) return 'Mixed Record, Overall Positive';
  if (score >= 280) return 'Controversial Figure';
  if (score >= 150) return 'Failed Presidency';
  return 'Worst President in American History';
}

// ── PASSIVE TICK ──────────────────────────────────────────────────────────────
function passiveTick(s) {
  s.inflation = clamp(s.inflation + rnd(-0.1, 0.1) - 0.05, -2, 40);
  s.gdp_growth = clamp(s.gdp_growth + rnd(-0.15, 0.2), -15, 12);
  s.unemployment = clamp(s.unemployment + rnd(-0.1, 0.12), 2, 30);

  // Market recovery
  const inWar = s.flags.iran_war || s.flags.china_war || s.flags.world_war_3;
  if (!inWar && s.market_confidence > 20) {
    const target = s.flags.massive_tariffs ? 65 : 75;
    if (s.market_confidence < target) s.market_confidence = Math.min(target, s.market_confidence + 0.6);
  }

  // Civil unrest decay
  s.civil_unrest = clamp(s.civil_unrest - 0.5, 0, 100);

  // Budget recovery
  s.budget_health = clamp(s.budget_health + 0.55, 0, 100);

  // Inflation consequences
  if (s.inflation > 8) {
    s.approval_i = clamp(s.approval_i - 0.4, 5, 95);
    s.approval_r = clamp(s.approval_r - 0.3, 20, 99);
    syncApproval(s);
  }

  // D approval soft cap
  if (s.approval_d > 45) {
    s.approval_d = clamp(s.approval_d - 0.35, 5, 55);
    syncApproval(s);
  }

  // Shutdown
  if (s.budget_health < 15 && !s.flags.shutdown_active) {
    s.flags.shutdown_active = true;
    applyEffects(s, { approval_i: -5, approval_r: -3, civil_unrest: 8 });
    addNews(s, '⚠ GOVERNMENT SHUTDOWN begins — federal agencies go dark');
  }
  if (s.flags.shutdown_active) {
    s.approval_i = clamp(s.approval_i - 0.8, 5, 95);
    s.approval_r = clamp(s.approval_r - 0.3, 20, 99);
    s.civil_unrest = clamp(s.civil_unrest + 0.6, 0, 100);
    syncApproval(s);
    if (s.budget_health >= 30) {
      s.flags.shutdown_active = false;
      addNews(s, 'Government shutdown ends — continuing resolution signed');
    }
  }

  // Iran war sustained effects — oil shock + military costs + war fatigue
  if (s.flags.iran_war) {
    if (!s.active_conflicts.includes('Iran-US War')) s.active_conflicts.push('Iran-US War');
    // Oil price keeps inflation elevated
    s.inflation = clamp(s.inflation + 0.12, -2, 40);
    // War fatigue hits independents slowly
    s.approval_i = clamp(s.approval_i - 0.15, 5, 95);
    // Budget drain from war spending
    s.budget_health = clamp(s.budget_health - 0.3, 0, 100);
    syncApproval(s);
  }

  // Economic collapse via sustained low market
  if (s.market_confidence < 15) s.consecutive_low_market++;
  else s.consecutive_low_market = 0;
  if (s.consecutive_low_market >= 3 && !s.flags.economic_collapse) {
    s.flags.economic_collapse = true;
    addNews(s, '💥 ECONOMIC COLLAPSE — markets in freefall, circuit breakers triggered');
  }

  // Conflict balance drift
  for (const c of s.active_conflicts) {
    if (s.conflict_balances[c] === undefined) s.conflict_balances[c] = 0;
    if (c === 'Ukraine-Russia War') {
      let adv = rnd(-0.5, 0.5);
      if (s.completed_actions.has('cut_ukraine_aid')) adv += 0.3;
      if (s.completed_actions.has('double_ukraine_aid')) adv -= 0.3;
      s.conflict_balances[c] = clamp(s.conflict_balances[c] + adv, -90, 90);
    } else {
      s.conflict_balances[c] = clamp(s.conflict_balances[c] + rnd(-0.3, 0.3), -90, 90);
    }
  }
  // Remove balances for ended conflicts
  for (const k of Object.keys(s.conflict_balances)) {
    if (!s.active_conflicts.includes(k)) delete s.conflict_balances[k];
  }
}

function fireRandomEvents(s) {
  const fired = [];
  for (const ev of EVENTS) {
    if (s.seen_events.has(ev.id)) continue;
    // one-time events
    const oneTime = ['pandemic_warning','pandemic_outbreak','assassination_attempt','allied_election'];
    try {
      if (!ev.condition(s)) continue;
    } catch(e) { continue; }
    if (Math.random() > ev.prob) continue;
    applyEffects(s, ev.effects);
    addNews(s, ev.headline);
    if (oneTime.includes(ev.id)) s.seen_events.add(ev.id);
    fired.push({ headline: ev.headline, body: ev.body });
  }
  return fired;
}

// ── MIDTERM ELECTIONS ─────────────────────────────────────────────────────────
function runMidterms(s) {
  let houseDelta = 0, senateDelta = 0;
  const ind = s.approval_i;
  if (ind >= 62) {
    houseDelta = Math.round(rnd(0, 5));
    senateDelta = Math.round(rnd(0, 2));
  } else if (ind >= 50) {
    houseDelta = Math.round(rnd(-8, 5));
    senateDelta = Math.round(rnd(-3, 2));
  } else if (ind >= 40) {
    houseDelta = Math.round(rnd(-15, 0));
    senateDelta = Math.round(rnd(-5, 0));
  } else {
    houseDelta = Math.round(rnd(-25, -5));
    senateDelta = Math.round(rnd(-8, -2));
  }
  s.house_seats = clamp(s.house_seats + houseDelta, 150, 340);
  s.senate_seats = clamp(s.senate_seats + senateDelta, 30, 100);
  s.midterm_done = true;
  return { houseDelta, senateDelta };
}

// ── GAME OVER CHECK ───────────────────────────────────────────────────────────
function checkGameOver(s) {
  if (s.turn >= 31) return { over:true, victory:true, reason:'TERM COMPLETE — January 20, 2029. Your presidency is history.' };
  if (s.flags.world_war_3) return { over:true, victory:false, reason:'WORLD WAR III — Nuclear exchange initiated. Billions are dead. Your legacy: the man who ended civilization.' };
  if (s.flags.economic_collapse) return { over:true, victory:false, reason:'ECONOMIC COLLAPSE — Great Depression II. Bread lines stretch for miles. The Dow has lost 60% of its value.' };
  if (s.legal_exposure >= 95) return { over:true, victory:false, reason:'REMOVED FROM OFFICE — The Senate convicts, 67-33. You leave the White House in handcuffs on live television.' };
  if (s.approval < 12) return { over:true, victory:false, reason:'FORCED RESIGNATION — Your cabinet invokes the 25th Amendment. Even your base has abandoned you. You resign in disgrace.' };
  return { over:false };
}

// ── UI STATE ──────────────────────────────────────────────────────────────────
let state = createState();
let ui = {
  view: 'game',  // 'game','outcome','midterm','end'
  selectedCategory: 'ALL',
  lastOutcome: null,
  lastEvents: [],
  pendingMidterm: null,
};

function getActionCooldownRemaining(s, action) {
  if (!action.cooldown) return 0;
  const lastUsed = s.action_cooldowns[action.id] || -999;
  return Math.max(0, action.cooldown - (s.turn - lastUsed));
}

function isActionAvailable(s, action) {
  if (action.oneTime && s.completed_actions.has(action.id)) return false;
  if (action.condition && !action.condition(s)) return false;
  if (getActionCooldownRemaining(s, action) > 0) return false;
  return true;
}

function getAvailableActions(s, category) {
  let acts = ACTIONS.filter(a => isActionAvailable(s, a));
  if (category && category !== 'ALL') acts = acts.filter(a => a.cat === category);
  return acts;
}

function rollOutcome(action, s) {
  if (!action.outcomes) {
    return {
      label: 'ACTION TAKEN',
      style: 'success',
      narrative: action.narrative || 'The action was carried out.',
      effects: action.effects || {}
    };
  }
  const probs = action.outcomes.map(o => {
    const p = typeof o.prob === 'function' ? o.prob(s) : o.prob;
    return Math.max(0, p);
  });
  const total = probs.reduce((a,b)=>a+b, 0);
  const norm = probs.map(p => p/total);
  const roll = Math.random();
  let cum = 0;
  for (let i = 0; i < action.outcomes.length; i++) {
    cum += norm[i];
    if (roll <= cum) return action.outcomes[i];
  }
  return action.outcomes[action.outcomes.length-1];
}

function executeAction(actionId) {
  const action = ACTIONS.find(a => a.id === actionId);
  if (!action || !isActionAvailable(state, action)) return;

  const outcome = rollOutcome(action, state);
  applyEffects(state, outcome.effects || {});
  addNews(state, `[Turn ${state.turn+1}] ${action.name}`);

  if (action.oneTime || action.completed) state.completed_actions.add(action.id);
  if (action.cooldown) state.action_cooldowns[action.id] = state.turn;

  state.action_history.push({ turn: state.turn, month: getDate(state).month + ' ' + getDate(state).year, name: action.name, label: outcome.label || 'DONE' });

  // Fire events
  const firedEvents = fireRandomEvents(state);

  // Passive tick
  passiveTick(state);

  // Check midterm (turn 5 = November 2026)
  if (state.turn === 4 && !state.midterm_done) {
    const mtResult = runMidterms(state);
    ui.view = 'midterm';
    ui.pendingMidterm = mtResult;
    ui.lastOutcome = { action, outcome, firedEvents };
    render();
    return;
  }

  state.turn++;

  const go = checkGameOver(state);
  if (go.over) {
    state.gameOver = true;
    state.victory = go.victory;
    state.endReason = go.reason;
    ui.view = 'end';
    render();
    return;
  }

  ui.lastOutcome = { action, outcome, firedEvents };
  ui.view = 'outcome';
  render();
}

function advanceFromOutcome() {
  ui.view = 'game';
  ui.lastOutcome = null;
  render();
}

function advanceFromMidterm() {
  state.turn++;
  const go = checkGameOver(state);
  if (go.over) {
    state.gameOver = true;
    state.victory = go.victory;
    state.endReason = go.reason;
    ui.view = 'end';
  } else if (ui.lastOutcome) {
    ui.view = 'outcome';
  } else {
    ui.view = 'game';
  }
  render();
}

// ── RENDER HELPERS ────────────────────────────────────────────────────────────
function pctBar(val, max, colorClass, h) {
  const pct = Math.min(100, Math.max(0, (val/max)*100));
  return `<div class="bar-track" style="height:${h||8}px"><div class="bar-fill ${colorClass}" style="width:${pct}%"></div></div>`;
}

function relColor(v) {
  if (v >= 50) return '#28a745';
  if (v >= 20) return '#6dde8d';
  if (v >= 0) return '#ffc107';
  if (v >= -30) return '#fd7e14';
  return '#dc3545';
}

function threatColor(t) {
  const c = ['','#28a745','#ffc107','#fd7e14','#dc3545','#ff0000'];
  return c[t] || '#6c757d';
}

function formatEffect(key, val) {
  if (key.startsWith('flag:') || key.startsWith('rel:') || key === 'add_conflict' || key === 'remove_conflict' || key === 'achievement' || key === 'disaster') return null;
  const names = {
    approval_r:'R Approval', approval_d:'D Approval', approval_i:'I Approval',
    approval:'Overall Approval', market_confidence:'Markets', gdp_growth:'GDP Growth',
    inflation:'Inflation', unemployment:'Unemployment', military_readiness:'Military Readiness',
    legal_exposure:'Legal Exposure', civil_unrest:'Civil Unrest', budget_health:'Budget Health',
    congress_support:'Congress Support', threat_level:'Threat Level',
    house_seats:'House Seats', senate_seats:'Senate Seats'
  };
  if (!names[key]) return null;
  const name = names[key];
  const pos = val > 0;
  const bad = ['inflation','unemployment','legal_exposure','civil_unrest','threat_level'].includes(key);
  const good = (pos && !bad) || (!pos && bad);
  return `<div class="effect-row"><span class="effect-name">${name}</span><span class="${good?'effect-pos':'effect-neg'}">${val>0?'+':''}${typeof val==='number'?val.toFixed(val%1===0?0:1):val}</span></div>`;
}

function outcomeStyleClass(style) {
  const m = { success:'success', partial:'partial', fail:'fail', undetected:'undetected', detected:'detected', exposed:'fail' };
  return m[style] || 'success';
}

function successChanceLabel(action, s) {
  if (!action.outcomes) return '';
  const probs = action.outcomes.map(o => typeof o.prob === 'function' ? o.prob(s) : o.prob);
  const total = probs.reduce((a,b)=>a+b,0);
  const p = total > 0 ? probs[0]/total : 0;
  if (p >= 0.70) return '<span class="badge badge-chance-high">HIGH</span>';
  if (p >= 0.40) return '<span class="badge badge-chance-med">MED</span>';
  return '<span class="badge badge-chance-low">LOW</span>';
}

// ── MAIN RENDER ───────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  if (ui.view === 'outcome') { app.innerHTML = renderOutcome(); return; }
  if (ui.view === 'midterm') { app.innerHTML = renderMidterm(); return; }
  if (ui.view === 'end') { app.innerHTML = renderEnd(); return; }
  app.innerHTML = renderGame();
}

  if (s.market_confidence < 25) warnings.push('⚠ MARKETS: Confidence at ' + s.market_confidence.toFixed(0) + '/100 — collapse risk growing');
  if (s.legal_exposure > 75) warnings.push('⚠ LEGAL: Exposure at ' + s.legal_exposure.toFixed(0) + '/100 — impeachment proceedings imminent');

  const availActs = getAvailableActions(s, catFilter);

        <div class="m-label">Military</div>
        <div class="m-value" style="color:${s.military_readiness>60?'#28a745':s.military_readiness>40?'#ffc107':'#dc3545'}">${s.military_readiness.toFixed(0)}</div>
        <div class="m-bar"><div class="m-bar-fill" style="width:${s.military_readiness}%;background:#0d6efd"></div></div>
      </div>
      <div class="metric-item">
        <div class="m-label">Threat Level</div>
        <div class="m-value" style="color:${threatColor(s.threat_level)}">${['','LOW','ELEVATED','HIGH','SEVERE','WAR'][s.threat_level]||s.threat_level}</div>
        <div class="threat-dots">${[1,2,3,4,5].map(i=>`<div class="threat-dot${i<=s.threat_level?' active-'+i:''}"></div>`).join('')}</div>
      </div>
      <div class="metric-item">
        <div class="m-label">Legal Risk</div>
        <div class="m-value" style="color:${s.legal_exposure<40?'#28a745':s.legal_exposure<70?'#ffc107':'#dc3545'}">${s.legal_exposure.toFixed(0)}/100</div>
        <div class="m-bar"><div class="m-bar-fill" style="width:${s.legal_exposure}%;background:${s.legal_exposure<40?'#28a745':'#dc3545'}"></div></div>
      </div>
      <div class="metric-item">
        <div class="m-label">Civil Unrest</div>
        <div class="m-value" style="color:${s.civil_unrest<35?'#28a745':s.civil_unrest<65?'#ffc107':'#dc3545'}">${s.civil_unrest.toFixed(0)}/100</div>
        <div class="m-bar"><div class="m-bar-fill" style="width:${s.civil_unrest}%;background:${s.civil_unrest<35?'#28a745':'#dc3545'}"></div></div>
      </div>
    </div>
    <div style="margin-top:8px;display:flex;gap:12px;font-size:11px">
      <span>House: <strong style="color:${s.house_seats>=218?'#28a745':'#dc3545'}">${s.house_seats}</strong>/435 (${s.house_seats>=218?'MAJORITY':'MINORITY'})</span>
      <span>Senate: <strong style="color:${s.senate_seats>=51?'#28a745':'#dc3545'}">${s.senate_seats}</strong>/100 (${s.senate_seats>=60?'SUPER':s.senate_seats>=51?'MAJ':'MIN'})</span>
    </div>
  </div>

  ${s.active_conflicts.length > 0 ? `<div class="card">
    <div class="card-title">Active Conflicts (${s.active_conflicts.length})</div>
    <div class="conflicts-list">
      ${s.active_conflicts.map(c => {
        const bal = s.conflict_balances[c] || 0;
        const balColor = bal > 20 ? '#28a745' : bal > -20 ? '#ffc107' : '#dc3545';
        const balDesc = bal > 30 ? 'US/Allies Winning' : bal > 0 ? 'Slight US Advantage' : bal > -30 ? 'Stalemate' : 'Adversary Gaining';
        return `<div class="conflict-item">
          <div class="conflict-name">${c}</div>
          <div class="conflict-balance" style="color:${balColor}">${balDesc} (${bal>0?'+':''}${bal.toFixed(0)})</div>
        </div>`;
      }).join('')}
    </div>
  </div>` : `<div class="card" style="border-color:#28a745"><div style="color:#28a745;font-size:12px;text-align:center">No active conflicts — peace holds</div></div>`}

  <div class="card">
    <div class="card-title">World Relations</div>
    <div class="relations-grid">
      ${Object.entries(s.relations).map(([country, val]) =>
        `<div class="rel-item"><div class="rel-name">${country}</div><div class="rel-val" style="color:${relColor(val)}">${val>0?'+':''}${val.toFixed(0)}</div></div>`
      ).join('')}
    </div>
  </div>

  <div class="card">
    <div class="card-title">News Wire</div>
    ${s.news_log.slice(0,4).map(n => `<div class="news-item">${n}</div>`).join('')}
  </div>

  ${warnings.length > 0 ? `<div class="warning-panel"><div class="warning-text">${warnings.join('<br>')}</div></div>` : ''}

  <div class="card">
    <div class="card-title">Presidential Actions</div>
    <div class="cat-filter">
      <button class="cat-btn${catFilter==='ALL'?' active':''}" onclick="setCategory('ALL')">All (${getAvailableActions(s,'ALL').length})</button>
      ${['FOREIGN','MILITARY','ECONOMIC','DOMESTIC','POLITICAL','CRIMES'].map(c =>
        `<button class="cat-btn ${c.toLowerCase()}${catFilter===c?' active':''}" onclick="setCategory('${c}')">${c} (${catCounts[c]})</button>`
      ).join('')}
    </div>
    ${availActs.length === 0 ? '<div class="no-actions">No actions available in this category right now.</div>' : actionCards}
  </div>
  </div>`;
}

function renderOutcome() {
  const { action, outcome, firedEvents } = ui.lastOutcome;
  const styleClass = outcomeStyleClass(outcome.style);
  const label = outcome.label || 'ACTION TAKEN';

  const effectRows = Object.entries(outcome.effects || {}).map(([k,v]) => formatEffect(k,v)).filter(Boolean).join('');

  const specialEffects = [];
  if (outcome.effects) {
    if (outcome.effects['flag:ukraine_war_active'] === false) specialEffects.push('🕊 Ukraine-Russia War ended');
    if (outcome.effects['flag:israel_conflict_active'] === false) specialEffects.push('🕊 Gaza Conflict ended');
    if (outcome.effects['flag:iran_war'] === true) specialEffects.push('💥 Iran War has begun');
    if (outcome.effects['add_conflict']) specialEffects.push('⚔️ New conflict: ' + outcome.effects['add_conflict']);
    if (outcome.effects['remove_conflict']) specialEffects.push('✅ Conflict resolved: ' + outcome.effects['remove_conflict']);
    if (outcome.effects['achievement']) specialEffects.push('🏆 Achievement: ' + outcome.effects['achievement']);
    if (outcome.effects['disaster']) specialEffects.push('💀 Disaster: ' + outcome.effects['disaster']);
  }

  return `<div class="overlay"><div class="outcome-box fade-in">
    <div class="outcome-label ${styleClass}">${label}</div>
    <div style="font-size:12px;color:#6c757d;text-align:center;margin-bottom:10px">${action.name}</div>
    <div class="outcome-narrative">${outcome.narrative || ''}</div>
    ${effectRows ? `<div class="card-title" style="margin-top:12px">Effects</div><div class="effects-list">${effectRows}</div>` : ''}
    ${specialEffects.length > 0 ? `<div style="margin:8px 0">${specialEffects.map(s=>`<div style="font-size:12px;padding:3px 0;color:#ffc107">${s}</div>`).join('')}</div>` : ''}
    ${firedEvents && firedEvents.length > 0 ? `<div class="card-title" style="margin-top:12px">Breaking Events</div>${firedEvents.map(e=>`<div class="event-flash"><div class="event-flash-title">⚡ ${e.headline}</div><div class="event-flash-body">${e.body}</div></div>`).join('')}` : ''}
    <button class="btn btn-primary" style="width:100%;margin-top:14px" onclick="advanceFromOutcome()">Continue →</button>
  </div></div>`;
}

function renderMidterm() {
  const s = state;
  const mt = ui.pendingMidterm;
  const houseMaj = s.house_seats >= 218;
  const senateMaj = s.senate_seats >= 51;

  return `<div class="overlay"><div class="outcome-box fade-in">
    <div class="midterm-screen">
      <div class="midterm-title">MIDTERM ELECTIONS</div>
      <div style="font-size:13px;color:#6c757d;margin-bottom:16px">November 2026 — The country votes</div>
      <div class="seat-display">
        <div class="seat-chamber">
          <div class="seat-count" style="color:${houseMaj?'#28a745':'#dc3545'}">${s.house_seats}</div>
          <div class="seat-label">House Seats</div>
          <div class="seat-status ${houseMaj?'held':'lost'}">${houseMaj?'MAJORITY HELD':'MAJORITY LOST'}</div>
          <div style="font-size:11px;color:#6c757d;margin-top:4px">${mt.houseDelta >= 0 ? '+' : ''}${mt.houseDelta} seats</div>
        </div>
        <div class="seat-chamber">
          <div class="seat-count" style="color:${senateMaj?'#28a745':'#dc3545'}">${s.senate_seats}</div>
          <div class="seat-label">Senate Seats</div>
          <div class="seat-status ${senateMaj?'held':'lost'}">${senateMaj?'MAJORITY HELD':'MAJORITY LOST'}</div>
          <div style="font-size:11px;color:#6c757d;margin-top:4px">${mt.senateDelta >= 0 ? '+' : ''}${mt.senateDelta} seats</div>
        </div>
      </div>
      <div style="font-size:13px;color:#b0b0c4;padding:10px;background:#0d0d14;border-radius:8px;text-align:left;margin-bottom:16px">
        ${houseMaj && senateMaj ? '✅ Republicans hold both chambers. Your legislative agenda remains intact.' :
          !houseMaj && !senateMaj ? '⚠️ Republicans lose both chambers. The next two years will be governed by executive order — and constant investigations.' :
          houseMaj ? '⚠️ Senate lost. You can still pass legislation, but judicial appointments become a battle.' :
          '⚠️ House lost. Expect investigations, subpoenas, and an uphill fight on every bill.'}
      </div>
      <button class="btn btn-primary" style="width:100%" onclick="advanceFromMidterm()">Continue →</button>
    </div>
  </div></div>`;
}

function renderEnd() {
  const s = state;
  const score = calcScore(s);
  const legacy = legacyTitle(score, s.victory);
  const d = getDate(s);

  return `<div class="overlay"><div class="outcome-box fade-in">
    <div class="end-screen">
      <div class="end-title ${s.victory?'victory-title':'defeat-title'}">${s.victory?'PRESIDENCY COMPLETE':'PRESIDENCY ENDED'}</div>
      <div class="end-reason">${s.endReason}</div>

      <div class="score-display">
        <div class="score-label">Final Score</div>
        <div class="score-number">${score}</div>
        <div class="score-bar"><div class="score-bar-fill" style="width:${score/10}%"></div></div>
        <div class="score-label" style="margin-top:4px">/1000</div>
      </div>

      <div class="legacy-title">"${legacy}"</div>

      <div class="section-sep"></div>
      <div class="card-title">Final Statistics</div>
      <div class="metrics-grid" style="margin-bottom:12px">
        <div class="metric-item"><div class="m-label">Overall Approval</div><div class="m-value" style="color:#ffc107">${s.approval.toFixed(0)}%</div></div>
        <div class="metric-item"><div class="m-label">Markets</div><div class="m-value">${s.market_confidence.toFixed(0)}/100</div></div>
        <div class="metric-item"><div class="m-label">Legal Risk</div><div class="m-value" style="color:${s.legal_exposure>60?'#dc3545':'#28a745'}">${s.legal_exposure.toFixed(0)}/100</div></div>
        <div class="metric-item"><div class="m-label">Inflation</div><div class="m-value" style="color:${s.inflation<4?'#28a745':'#dc3545'}">${s.inflation.toFixed(1)}%</div></div>
      </div>

      ${s.major_achievements.length > 0 ? `<div class="card-title">Achievements</div><div class="achievements-list" style="margin-bottom:10px">${s.major_achievements.map(a=>`<div class="achievement-item">✓ ${a}</div>`).join('')}</div>` : ''}
      ${s.major_disasters.length > 0 ? `<div class="card-title">Disasters</div><div class="achievements-list" style="margin-bottom:10px">${s.major_disasters.map(a=>`<div class="disaster-item">✗ ${a}</div>`).join('')}</div>` : ''}

      <div class="section-sep"></div>
      <div class="card-title">Action History (${s.action_history.length} actions)</div>
      <div class="history-list">
        ${s.action_history.map(h=>`<div class="history-item"><span>${h.month}</span> — ${h.name} [${h.label}]</div>`).join('') || '<div class="history-item">No actions taken</div>'}
      </div>

      <button class="btn btn-primary" style="width:100%;margin-top:16px" onclick="resetGame()">Play Again</button>
    </div>
  </div></div>`;
}

function setCategory(cat) {
  ui.selectedCategory = cat;
  render();
}

function resetGame() {
  state = createState();
  ui = { view:'game', selectedCategory:'ALL', lastOutcome:null, lastEvents:[], pendingMidterm:null };
  render();
}

// Initial render
render();
</script>
</body>
</html>
